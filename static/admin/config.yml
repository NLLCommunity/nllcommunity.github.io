backend:
  name: github
  repo: NLLCommunity/nllcommunity.github.io
  base_url: https://sveltia-cms-auth.myrkvi.workers.dev/

media_folder: /static/images
public_folder: /images

collections:
  - name: posts
    label: Posts
    folder: content/post
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"

      - label: "Author"
        name: "author"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        type: "date"

      - label: "Categories"
        name: "categories"
        widget: "list"

      - label: "Body"
        name: "body"
        widget: "richtext"
