backend:
  name: github
  repo: NLLCommunity/nllcommunity.github.io
  base_url: https://sveltia-cms-auth.myrkvi.workers.dev/

media_folder: /static/images
public_folder: /images

singletons:
  - name: home
    label: Home
    file: content/_index.md
    format: yaml-frontmatter
    extension: md
    fields:
      - label: "Body"
        name: "body"
        widget: "richtext"
  - name: config
    label: Configuration
    file: config.yml
    format: yml
    fields:
      - name: "params"
        widget: "object"
        fields:
          - label: "Site Title"
            name: "homeTitle"
            widget: "string"
          - label: "Logo"
            name: "logo"
            widget: "image"
          - label: "Favicon"
            name: "favicon"
          - label: "Date Format"
            comment: "Go time format, e.g. Monday Jan 2 15:04:05 MST 2006"
            name: "dateFormat"
            widget: "string"
          - label: "Time Zone"
            name: "timeZone"
            widget: "string"
          - label: "Enable Comments"
            name: "comments"
            widget: "boolean"

collections:
  - name: categories
    label: Categories
    folder: content/categories
    format: yml
    create: true
    delete: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

  - name: authors
    label: Authors
    folder: content/authors
    path: "{{slug}}/_index"
    format: yaml-frontmatter
    extension: md
    create: true
    delete: true
    fields:
      - { label: "Name",      name: "title",   widget: "string" }
      - { label: "Avatar",    name: "avatar",  widget: "image",  required: false }
      - { label: "GitHub",    name: "github",  widget: "string", required: false, hint: "username only" }
      - { label: "Twitter/X", name: "twitter", widget: "string", required: false, hint: "handle only" }
      - { label: "Bluesky",   name: "bluesky", widget: "string", required: false, hint: "e.g. name.bsky.social" }
      - { label: "Website",   name: "website", widget: "string", required: false, hint: "full URL" }
      - { label: "Discord",   name: "discord", widget: "string", required: false }
      - { label: "Bio",       name: "body",    widget: "markdown" }

  - name: pages
    label: Pages
    folder: content/page
    create: true
    delete: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Draft"
        name: "draft"
        widget: "boolean"
      - label: "Body"
        name: "body"
        widget: "richtext"

  - name: posts
    label: Posts
    folder: content/post
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false

      - label: "Authors"
        label_singular: "Author"
        name: "authors"
        widget: "relation"
        multiple: true
        collection: "authors"
        search_fields: ["title"]
        display_fields: ["title"]
        value_field: "{{slug}}"
        required: false

      - label: "Date"
        name: "date"
        widget: "datetime"
        type: "date"

      - label: "Draft"
        name: "draft"
        widget: "boolean"

      - label: "Categories"
        label_singular: "Category"
        name: "categories"
        widget: "relation"
        multiple: true
        collection: "categories"
        search_fields: ["title"]
        display_fields: ["title"]
        value_field: "{{slug}}"

      - label: "Body"
        name: "body"
        widget: "richtext"
